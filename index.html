<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Outfit:wght@100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
            rel="stylesheet"
        />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Outfit:wght@100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
            rel="stylesheet"
        />
        <link
            rel="icon"
            type="image/png"
            sizes="32x32"
            href="./images/favicon-32x32.png"
        />
        <link rel="stylesheet" href="./styles/style.css" />
        <title>Frontend Mentor | Product preview card component</title>
    </head>
    <body>
        <div class="wrapper">
            <div class="image-container">
                <img src="./images/image-product-desktop.jpg" alt="product" />
            </div>
            <div class="text-container">
                <div class="tag">Perfume</div>
                <div class="name">Gabrielle Essence Eau De Parfum</div>
                <div class="desc">
                    A floral, solar and voluptuous interpretation composed by
                    Olivier Polge, Perfumer-Creator for the House of CHANEL.
                </div>
                <div class="price">
                    <span class="price-main">$149.99</span
                    ><span class="price-discount">$169.99</span>
                </div>
                <button class="cart-button">
                    <span
                        ><img src="./images/icon-cart.svg" alt="cart-icon"
                    /></span>
                    Add to Cart
                </button>
            </div>
        </div>
        <footer class="attribution">
            Challenge by
            <a
                href="https://www.frontendmentor.io?ref=challenge"
                target="_blank"
                rel="noopener noreferrer"
                >Frontend Mentor</a
            >. Coded by
            <a
                href="https://github.com/ShamardinaEM"
                target="_blank"
                rel="noopener noreferrer"
                >ShamardinaEM</a
            >.
        </footer>
    </body>
</html>
